<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Akshay Narsipur | Portfolio</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: linear-gradient(120deg,#f8fbff,#eef7ff);
}

.container {
  width: 90%;
  margin: auto;
}

.hero {
  display: grid;
  grid-template-columns: 1fr 1fr;
  padding: 60px 0;
  gap: 40px;
}

h1 {
  font-size: 48px;
}

.gradient {
  color: purple;
}

.btn {
  padding: 10px 20px;
  background: purple;
  color: white;
  border-radius: 8px;
  display: inline-block;
  margin-right: 10px;
}

/* CONTROL PANEL */
.panel {
  background: #0b1b43;
  color: white;
  padding: 20px;
  border-radius: 20px;
}

.screen {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 10px;
}

.mode-btn {
  margin-top: 10px;
  padding: 10px;
  background: gray;
  border: none;
  color: white;
  cursor: pointer;
  display: block;
  width: 100%;
}

.mode-btn.active {
  background: purple;
}
</style>
</head>

<body>

<div class="container hero">

<div>
<h1>I build <span class="gradient">revenue systems</span></h1>
<p>Turning chaos into control using systems, data, and automation.</p>

<a class="btn">View Work</a>
<a class="btn">Contact</a>
</div>

<div class="panel">
<div class="screen">
<h3 id="title">Pipeline</h3>
<h1 id="metric">$142M</h1>
<p id="desc">Pipeline influenced</p>
</div>

<button class="mode-btn active" onclick="setMode('pipeline')">Pipeline</button>
<button class="mode-btn" onclick="setMode('forecast')">Forecast</button>
<button class="mode-btn" onclick="setMode('data')">Data</button>
<button class="mode-btn" onclick="setMode('cpq')">CPQ</button>

</div>

</div>

<script>
function setMode(mode) {
  const title = document.getElementById("title");
  const metric = document.getElementById("metric");
  const desc = document.getElementById("desc");

  document.querySelectorAll(".mode-btn").forEach(btn => btn.classList.remove("active"));

  if(mode === "pipeline"){
    title.innerText="Pipeline";
    metric.innerText="$142M";
    desc.innerText="Pipeline influenced";
    document.querySelectorAll(".mode-btn")[0].classList.add("active");
  }

  if(mode === "forecast"){
    title.innerText="Forecast";
    metric.innerText="+24%";
    desc.innerText="Forecast accuracy";
    document.querySelectorAll(".mode-btn")[1].classList.add("active");
  }

  if(mode === "data"){
    title.innerText="Data Quality";
    metric.innerText="98%";
    desc.innerText="Data accuracy";
    document.querySelectorAll(".mode-btn")[2].classList.add("active");
  }

  if(mode === "cpq"){
    title.innerText="CPQ";
    metric.innerText="-18%";
    desc.innerText="Cycle time reduction";
    document.querySelectorAll(".mode-btn")[3].classList.add("active");
  }
}
</script>

</body>
</html>
